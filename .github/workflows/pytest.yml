name: tests

# Regenerates the catalog the same way a downstream consumer does — clone
# MobilityDB master for the MEOS headers, parse with libclang, emit
# output/meos-idl.json — then runs the pytest suite (type recovery + portable
# alias parity) against it. Gives every PR a green signal on catalog
# correctness; master itself has no other CI, so without this the
# catalog-enrichment PRs show "no checks".
#
# The apt header set + libclang wheel match the OpenAPI-validate regenerate
# path so both produce the same catalog.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  tests:
    name: Regenerate catalog + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # libclang (Python wheel) needs the system C headers MEOS depends on so
      # types like size_t / json_object * / GSERIALIZED * resolve to their real
      # names instead of degrading to int / int *. Same install set as the
      # OpenAPI-validate workflow so both regenerate paths agree.
      - name: Install dev headers for libclang sysroot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev \
            libjson-c-dev libgsl-dev libproj-dev libgeos-dev \
            postgresql-server-dev-16

      - name: Clone MobilityDB master (MEOS headers source)
        run: |
          git clone --depth 1 https://github.com/MobilityDB/MobilityDB \
            "$RUNNER_TEMP/mobilitydb"
          echo "MOBILITYDB_HEADERS=$RUNNER_TEMP/mobilitydb/meos/include" \
            >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Regenerate the catalog
        run: python3 run.py "$MOBILITYDB_HEADERS"

      - name: Run the test suite
        run: python3 -m pytest tests/ -v

      - name: Upload meos-idl.json as artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meos-idl
          path: output/meos-idl.json
          if-no-files-found: error
